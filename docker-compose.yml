services:
  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: sqlite:////runtime/data/test.db
      INPUT_ROOT_PATH: /app/INPUT
      QDRANT_URL: http://qdrant:6333
      BM25_INDEX_PATH: /runtime/tmp/bm25_index.json
      TMP_DIR: /runtime/tmp
      ARTIFACTS_DIR: /runtime/artifacts
    ports:
      - "8000:8000"
    volumes:
      - ./INPUT:/app/INPUT
      - backend_runtime:/runtime
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  backend_runtime:
